name: agilab_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python version — update to match your project's requirements
  - python=3.11
  - pip
  - ipykernel

  # Core scientific computation — uncomment and pin versions as needed
  - numpy
  - scipy
  - pandas
  - matplotlib

  # PyTorch & CUDA — uncomment and adjust versions based on your GPU driver
  # See https://pytorch.org/get-started/locally/ for compatible version combinations
  # - pytorch
  # - torchvision
  # - torchaudio
  # - pytorch-cuda=12.1   # requires driver >= 525.60; omit for CPU-only

  # Development tools — kept pinned to ensure consistent CI behaviour
  - pre-commit=3.7.1
  - ruff=0.4.10

  # Pip packages — add project-specific dependencies below
  - pip:
    # Installs the local package in editable mode (required)
    - -e .[dev]
    # Examples of common AI/research packages:
    # - transformers

