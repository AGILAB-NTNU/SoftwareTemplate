name: agilab_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python version (Standard version for maximum compatibility)
  - python=3.9

  # Core Scientific computation
  - numpy>=2.0
  - scipy>=1.11
  - pandas>=2.1
  - matplotlib>=3.8
  
  # PyTorch & CUDA (Adjust versions based on your local GPU drivers)
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=12.1

  # Pip packages (For packages not available or updated faster on pip)
  - pip:
    # This installs the local package in editable mode
    - -e .[dev]
    # Add other pip-only dependencies below
    # - transformers=4.38.2
    # - gymnasium=0.29.1
